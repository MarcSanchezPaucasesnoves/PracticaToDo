<!DOCTYPE html>
<html lang="ca">
    <head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1">

	    <meta name="keywords" content="Aplicació web, Tasques">
	    <meta name="author" content="Marc Sánchez Alonso">

	    <link rel="stylesheet" href="css/style.css">

	    <title>Llistat d'Activitats</title>
    </head>
    <body>
        <header class="bg-color-blue">
            <nav>
                <h2 class="color-white margin-left-15px">Menú</h2>
                <ul class="flex flex-direction-column list-style-type-none menu-list gap-20px">
                    <li><div class="flex align-items-center"><a href="index.html">Llistat d'activitats</a></div></li>
                    <li><div class="flex align-items-center"><a href="crear-tasca.html">Crear tasca</a></div></li>
                    <li><div class="flex align-items-center"><a href="categories.html">Gestió de Categories</a></div></li>
                </ul>
	        </nav>
        </header>

        <main class="margin-left-30pc margin-right-30pc gap-20px">
            <h1 class="text-align-center">Gestió de categories</h1>

            <form action="" class="flex flex-direction-column form-crear-tasca align-items-flex-start gap-20px border-radius justify-content-space-between align-items-center padding-20px">
                <div class="width-100pc">
                    <label for="categoria" class="width-100pc">Nova Categoria:</label>
                    <input type="text" name="categoria" id="categoria" class="width-100pc">
                </div>

                <div class="width-100pc flex align-items-center gap-20px">
                    <label for="colorCategoria">Color de la Categoria:</label>
                    <input type="color" name="colorCategoria" id="colorCategoria" class="padding-3px-5px">
                </div>

                <button>Afegir Categoria</button>
                
            </form>

            <div class="width-100pc min-height-20px bg-color-white margin-top-20px">

            </div>
        </main>
	    
        <footer class="">
        </footer>
	
        <script type="module" src=""></script>
