<!DOCTYPE html>
<html lang="ca">
    <head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1">
	    <meta name="description" content="Aplicació web per les llistes ToDo.">
	    <meta name="keywords" content="Aplicació web, Tasques">
	    <meta name="author" content="Marc Sánchez Alonso">

	    <link rel="stylesheet" href="css/style.css">

	    <title>Llistat d'Activitats</title>
    </head>
    <body>
        <header class="bg-color-blue">
            <nav>
                <h2 class="color-white margin-left-15px">Menú</h2>
                <ul class="flex flex-direction-column list-style-type-none menu-list gap-20px">
                    <li><div class="flex align-items-center"><a href="index.html">Llistat d'activitats</a></div></li>
                    <li><div class="flex align-items-center"><a href="crear-tasca.html">Crear tasca</a></div></li>
                    <li><div class="flex align-items-center"><a href="categories.html">Gestió de Categories</a></div></li>
                </ul>
	        </nav>
        </header>

        <main class="margin-left-30pc margin-right-30pc">
            <h1 class="text-align-center">Crear Nova Tasca</h1>

            <form action="" class="flex flex-direction-column form-crear-tasca align-items-flex-start gap-20px border-radius justify-content-space-between align-items-center padding-20px">
                <div class="width-100pc flex flex-direction-column gap-10px">
                    <label for="titol" class="width-100pc">Títol:</label>
                    <input type="text" name="titol" id="titol" class="width-100pc" required>
                </div>
                
                <div class="width-100pc flex flex-direction-column gap-10px">
                    <label for="descripcio" class="width-100pc">Descripció:</label>
                    <textarea name="descripcio" id="descripcio" rows="3" class="width-100pc"></textarea>
                </div>
                
                <div class="width-100pc flex flex-direction-column gap-10px">
                    <label for="data" class="width-100pc">Data:</label>
                    <input type="date" name="data" id="data" class="width-100pc">
                </div>
                
                <div class="width-100pc flex flex-direction-column gap-10px">
                    <label for="categoria" class="width-100pc">Categoria:</label>
                    <select name="categoria" id="categoria" class="width-100pc">
                        
                    </select>
                </div>
                
                <div class="width-100pc flex flex-direction-column gap-10px">
                    <label for="prioritat" class="width-100pc">Prioritat:</label>
                    <select name="prioritat" id="prioritat" class="width-100pc">
                        <option value="">Baixa</option>
                        <option value="">Mitjana</option>
                        <option value="">Alta</option>
                    </select>
                </div>

                <button>Crear Tasca</button>
                
            </form>
        </main>
	    
        <footer class="">
        </footer>
	
        <script type="module" src="js/form-tasca.js"></script>
    </body>
</html>
